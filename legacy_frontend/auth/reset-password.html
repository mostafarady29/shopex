<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset Password - E-Commerce Store">
    <title>Reset Password - E-Commerce Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A0E14 0%, #131A26 50%, #192334 100%);
            padding: 2rem 0;
        }

        .reset-container {
            width: 100%;
            max-width: 450px;
            padding: 0 1rem;
        }

        .reset-card {
            background: var(--bg-primary);
            border-radius: var(--radius-2xl);
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.5s ease-out;
        }

        .icon-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .reset-card h2 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .reset-card p {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            color: var(--text-primary);
            transition: all var(--transition-base);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.1);
            background: var(--bg-primary);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 153, 204, 0.3);
        }

        .password-requirements {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .password-requirements h6 {
            font-size: 0.875rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .password-requirements li {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-requirements li i {
            color: var(--text-muted);
        }

        .password-requirements li.valid i {
            color: var(--success-color);
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-full);
            color: white;
            cursor: pointer;
            transition: all var(--transition-base);
            z-index: 1000;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <button class="theme-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
    </button>

    <div class="reset-container">
        <div class="reset-card">
            <div class="icon-section">
                <div class="icon-circle">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h2>Reset Password</h2>
                <p>Create a new strong password for your account.</p>
            </div>

            <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
                <input type="hidden" name="token" value="demo-token-123">

                <div class="form-group">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                        placeholder="Enter new password" required minlength="8" data-strength="true">
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                        placeholder="Re-enter new password" required>
                </div>

                <div class="password-requirements">
                    <h6>Password must contain:</h6>
                    <ul id="passwordRequirements">
                        <li id="req-length"><i class="bi bi-circle"></i> At least 8 characters</li>
                        <li id="req-uppercase"><i class="bi bi-circle"></i> One uppercase letter</li>
                        <li id="req-lowercase"><i class="bi bi-circle"></i> One lowercase letter</li>
                        <li id="req-number"><i class="bi bi-circle"></i> One number</li>
                        <li id="req-special"><i class="bi bi-circle"></i> One special character</li>
                    </ul>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="bi bi-check-lg"></i> Reset Password
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        const newPasswordInput = document.getElementById('newPassword');

        newPasswordInput.addEventListener('input', (e) => {
            const password = e.target.value;

            // Check length
            const reqLength = document.getElementById('req-length');
            if (password.length >= 8) {
                reqLength.classList.add('valid');
                reqLength.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqLength.classList.remove('valid');
                reqLength.querySelector('i').className = 'bi bi-circle';
            }

            // Check uppercase
            const reqUppercase = document.getElementById('req-uppercase');
            if (/[A-Z]/.test(password)) {
                reqUppercase.classList.add('valid');
                reqUppercase.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqUppercase.classList.remove('valid');
                reqUppercase.querySelector('i').className = 'bi bi-circle';
            }

            // Check lowercase
            const reqLowercase = document.getElementById('req-lowercase');
            if (/[a-z]/.test(password)) {
                reqLowercase.classList.add('valid');
                reqLowercase.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqLowercase.classList.remove('valid');
                reqLowercase.querySelector('i').className = 'bi bi-circle';
            }

            // Check number
            const reqNumber = document.getElementById('req-number');
            if (/\d/.test(password)) {
                reqNumber.classList.add('valid');
                reqNumber.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqNumber.classList.remove('valid');
                reqNumber.querySelector('i').className = 'bi bi-circle';
            }

            // Check special character
            const reqSpecial = document.getElementById('req-special');
            if (/[^a-zA-Z\d]/.test(password)) {
                reqSpecial.classList.add('valid');
                reqSpecial.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqSpecial.classList.remove('valid');
                reqSpecial.querySelector('i').className = 'bi bi-circle';
            }
        });

        function handleResetPassword(event) {
            event.preventDefault();

            const form = event.target;
            const newPassword = form.newPassword.value;
            const confirmPassword = form.confirmPassword.value;

            if (newPassword !== confirmPassword) {
                if (window.ecommerce && window.ecommerce.showToast) {
                    window.ecommerce.showToast('Passwords do not match!', 'error');
                }
                return;
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';

            setTimeout(() => {
                if (window.ecommerce && window.ecommerce.showToast) {
                    window.ecommerce.showToast('Password reset successfully!', 'success');
                }

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }, 2000);
        }
    </script>
</body>

</html>
