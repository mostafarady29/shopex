<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your account - E-Commerce Store">
    <title>Login - E-Commerce Store</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A0E14 0%, #131A26 50%, #192334 100%);
            padding: 2rem 0;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 0 1rem;
        }

        .login-card {
            background: var(--bg-primary);
            border-radius: var(--radius-2xl);
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.5s ease-out;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-left: 3rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            color: var(--text-primary);
            transition: all var(--transition-base);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.15);
            background: var(--bg-primary);
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.125rem;
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.125rem;
            padding: 0.25rem;
            transition: color var(--transition-fast);
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .remember-me label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0;
        }

        .forgot-link {
            font-size: 0.875rem;
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 153, 204, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider span {
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .social-btn:hover {
            background: var(--bg-primary);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .social-btn i {
            font-size: 1.25rem;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .signup-link p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 0;
        }

        .signup-link a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .signup-link a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-full);
            color: white;
            cursor: pointer;
            transition: all var(--transition-base);
            z-index: 1000;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <h1 class="logo">SaaS Hub</h1>
                <p class="logo-subtitle">Welcome back! Please login to your account.</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Email/Username Input -->
                <div class="form-group">
                    <label for="username" class="form-label">Email or Username</label>
                    <div class="input-group">
                        <i class="bi bi-person-fill input-icon"></i>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Enter your email or username" required autocomplete="username">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn" onclick="socialLogin('google')">
                    <i class="bi bi-google"></i>
                    Google
                </button>
                <button class="social-btn" onclick="socialLogin('facebook')">
                    <i class="bi bi-facebook"></i>
                    Facebook
                </button>
            </div>

            <!-- Additional Links -->
            <div class="text-center mb-3">
                <a href="forgot-userid.html" class="forgot-link">
                    <i class="bi bi-question-circle"></i> Forgot User ID?
                </a>
            </div>

            <!-- Signup Link -->
            <div class="signup-link">
                <p>Don't have an account? <a href="register.html">Sign up now</a></p>
            </div>

            <!-- Demo Role Selector -->
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1rem;">Quick
                    Demo Access (select role)</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <button class="social-btn" onclick="demoLogin('user')" style="font-size: 0.85rem;">
                        <i class="bi bi-person"></i> User
                    </button>
                    <button class="social-btn" onclick="demoLogin('affiliate')" style="font-size: 0.85rem;">
                        <i class="bi bi-diagram-3"></i> Affiliate
                    </button>
                    <button class="social-btn" onclick="demoLogin('moderator')" style="font-size: 0.85rem;">
                        <i class="bi bi-shield-check"></i> Moderator
                    </button>
                    <button class="social-btn" onclick="demoLogin('admin')" style="font-size: 0.85rem;">
                        <i class="bi bi-gear-wide-connected"></i> Admin
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/components.js"></script>

    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.currentTarget.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash-fill';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye-fill';
            }
        }

        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();

            const form = event.target;
            const email = form.username.value;
            const password = form.password.value;
            const remember = form.remember.checked;

            // Show loading state
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            try {
                // Call API
                const response = await window.ecommerceAPI.auth.login(email, password);

                if (response.success) {
                    // Show success message
                    if (window.ecommerce && window.ecommerce.showToast) {
                        window.ecommerce.showToast('Login successful! Redirecting...', 'success');
                    }

                    // Redirect to homepage or user dashboard
                    setTimeout(() => {
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirect = urlParams.get('redirect') || '../index.html';
                        window.location.href = redirect;
                    }, 1000);
                } else {
                    throw new Error(response.message || 'Login failed');
                }
            } catch (error) {
                // Show error message
                if (window.ecommerce && window.ecommerce.showToast) {
                    window.ecommerce.showToast(error.message || 'Login failed. Please try again.', 'error');
                }

                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        // Social login handler
        function socialLogin(provider) {
            if (window.ecommerce && window.ecommerce.showToast) {
                window.ecommerce.showToast(`${provider} login will be integrated with backend`, 'info');
            }
        }

        // Demo login by role
        function demoLogin(role) {
            const token = 'mock_token_' + Date.now();
            localStorage.setItem('authToken', token);
            localStorage.setItem('userRole', role);
            localStorage.setItem('currentUser', JSON.stringify({
                _id: 'user-1', name: 'John Doe', email: 'john@example.com', role: role
            }));

            if (window.ecommerce && window.ecommerce.showToast) {
                window.ecommerce.showToast(`Logged in as ${role}. Redirecting...`, 'success');
            }

            const routes = {
                user: '../user/dashboard.html',
                affiliate: '../user/affiliate-dashboard.html',
                moderator: '../admin/moderator.html',
                admin: '../admin/dashboard.html'
            };

            setTimeout(() => {
                window.location.href = routes[role] || '../index.html';
            }, 800);
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (window.ecommerceAPI && window.ecommerceAPI.auth.isAuthenticated()) {
                const role = localStorage.getItem('userRole') || 'user';
                const routes = {
                    user: '../user/dashboard.html',
                    affiliate: '../user/affiliate-dashboard.html',
                    moderator: '../admin/moderator.html',
                    admin: '../admin/dashboard.html'
                };
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if (!redirect) {
                    window.location.href = routes[role] || '../user/dashboard.html';
                }
            }
        });
    </script>
</body>

</html>
