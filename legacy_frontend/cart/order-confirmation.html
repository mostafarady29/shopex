<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order Confirmation - SaaS Hub">
    <title>Order Confirmed - SaaS Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-hexagon-fill"></i> SaaS Hub
            </a>
        </div>
    </nav>

    <!-- Confirmation Content -->
    <div class="container" style="padding: 4rem 0; text-align: center;">
        <div style="max-width: 600px; margin: 0 auto;">
            <div
                style="width: 100px; height: 100px; margin: 0 auto 2rem; background: var(--success-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: scaleIn 0.5s ease-out;">
                <i class="bi bi-check-lg" style="font-size: 3rem; color: white;"></i>
            </div>

            <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-primary);">Order Confirmed!</h1>
            <p style="font-size: 1.125rem; color: var(--text-secondary); margin-bottom: 2rem;">
                Thank you for your purchase. Your order has been successfully placed.
            </p>

            <div
                style="background: var(--bg-secondary); border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 2rem; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span style="color: var(--text-secondary);">Order Number:</span>
                    <span style="font-weight: 700; color: var(--text-primary);">#ORD-2026-001</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span style="color: var(--text-secondary);">Order Date:</span>
                    <span style="font-weight: 600; color: var(--text-primary);" id="orderDate"></span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-secondary);">Estimated Delivery:</span>
                    <span style="font-weight: 600; color: var(--primary-color);" id="deliveryDate"></span>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="../user/orders.html" class="btn-custom btn-primary">
                    <i class="bi bi-box-seam"></i> View Order
                </a>
                <a href="../index.html" class="btn-custom btn-outline-primary">
                    <i class="bi bi-house"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        // Set dates
        const now = new Date();
        document.getElementById('orderDate').textContent = now.toLocaleDateString();

        const deliveryDate = new Date(now);
        deliveryDate.setDate(deliveryDate.getDate() + 5);
        document.getElementById('deliveryDate').textContent = deliveryDate.toLocaleDateString();
    </script>
</body>

</html>
