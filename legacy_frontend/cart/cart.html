<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shopping Cart - SaaS Hub">
    <title>Shopping Cart - SaaS Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-hexagon-fill"></i> SaaS Hub
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../products/catalog.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/contact.html">Contact</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <button class="btn-icon" id="darkModeToggle" title="Toggle dark mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>

                    <a href="cart.html" class="btn-icon position-relative" title="Shopping cart">
                        <i class="bi bi-cart3"></i>
                        <span id="cartCounter"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="display: none;">
                            0
                        </span>
                    </a>

                    <a href="../user/dashboard.html" class="btn-icon" title="My account">
                        <i class="bi bi-person-fill"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div style="background: var(--primary-gradient); padding: 3rem 0; color: white;">
        <div class="container">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Shopping Cart</h1>
            <p style="font-size: 1.125rem; margin: 0; opacity: 0.9;">Review your items before checkout</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" style="padding: 3rem 0;">
        <div class="row">
            <!-- Cart Items -->
            <div class="col-lg-8 mb-4">
                <div id="cartItems">
                    <!-- Cart items will be loaded here by JavaScript -->
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card-custom" style="position: sticky; top: 100px;">
                    <h3 style="font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text-primary);">Order Summary</h3>

                    <div style="margin-bottom: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                            <span style="color: var(--text-secondary);">Subtotal:</span>
                            <span id="cartSubtotal" style="font-weight: 600; color: var(--text-primary);">$0.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                            <span style="color: var(--text-secondary);">Tax (10%):</span>
                            <span id="cartTax" style="font-weight: 600; color: var(--text-primary);">$0.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
                            <span style="color: var(--text-secondary);">Shipping:</span>
                            <span id="cartShipping" style="font-weight: 600; color: var(--text-primary);">$0.00</span>
                        </div>
                        <hr style="border-color: var(--border-color); margin: 1rem 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span
                                style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary);">Total:</span>
                            <span id="cartTotal"
                                style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);">$0.00</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <input type="text" class="form-control" placeholder="Enter coupon code"
                            style="margin-bottom: 0.75rem;">
                        <button class="btn-custom btn-outline-primary" style="width: 100%;">
                            <i class="bi bi-tag"></i> Apply Coupon
                        </button>
                    </div>

                    <a href="checkout.html" class="btn-custom btn-primary"
                        style="width: 100%; text-align: center; display: block;">
                        <i class="bi bi-credit-card"></i> Proceed to Checkout
                    </a>

                    <a href="../products/catalog.html"
                        style="display: block; text-align: center; margin-top: 1rem; color: var(--primary-color); text-decoration: none;">
                        <i class="bi bi-arrow-left"></i> Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: var(--bg-tertiary); padding: 3rem 0; margin-top: 4rem;">
        <div class="container">
            <div class="text-center">
                <p style="color: var(--text-muted); font-size: 0.875rem; margin: 0;">
                    © 2026 SaaS Hub. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/components.js"></script>
</body>

</html>
