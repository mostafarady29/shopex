<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search Products - SaaS Hub">
    <title>Search Products - SaaS Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-hexagon-fill"></i> SaaS Hub
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="catalog.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/contact.html">Contact</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <button class="btn-icon" id="darkModeToggle">
                        <i class="bi bi-moon-fill"></i>
                    </button>

                    <a href="../cart/cart.html" class="btn-icon position-relative">
                        <i class="bi bi-cart3"></i>
                        <span id="cartCounter"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="display: none;">0</span>
                    </a>

                    <a href="../user/dashboard.html" class="btn-icon">
                        <i class="bi bi-person-fill"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Search Header -->
    <div style="background: var(--primary-gradient); padding: 3rem 0; color: white;">
        <div class="container">
            <h1 style="font-size: 2.5rem; margin-bottom: 1.5rem;">Search Products</h1>

            <div class="search-bar-container" style="max-width: 800px;">
                <input type="text" class="search-bar-input" id="searchInput" placeholder="Search for products..."
                    value="">
                <button class="search-bar-button" onclick="performSearch()">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" style="padding: 3rem 0;">
        <div id="searchResults">
            <div style="text-align: center; padding: 4rem 0;">
                <i class="bi bi-search" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">Start Your Search</h3>
                <p style="color: var(--text-muted);">Enter keywords to find products</p>
            </div>
        </div>

        <div id="resultsContainer" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 id="resultsCount" style="color: var(--text-primary); margin: 0;"></h3>
                <select class="form-control" style="width: auto;" onchange="sortResults(this.value)">
                    <option value="relevance">Most Relevant</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>

            <div class="row g-4" id="productResults"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: var(--bg-tertiary); padding: 3rem 0; margin-top: 4rem;">
        <div class="container">
            <div class="text-center">
                <p style="color: var(--text-muted); font-size: 0.875rem; margin: 0;">
                    © 2026 SaaS Hub. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/components.js"></script>

    <script>
        const allProducts = [
            {
                id: 'prod-1',
                name: 'Premium Wireless Headphones',
                category: 'Electronics',
                price: 299.99,
                originalPrice: 399.99,
                image: '../assets/images/product_headphones_1768510726683.png',
                rating: 4.5,
                badge: 'sale'
            },
            {
                id: 'prod-2',
                name: 'Smart Watch Pro',
                category: 'Electronics',
                price: 399.99,
                image: '../assets/images/product_smartwatch_1768510745513.png',
                rating: 4.8,
                badge: 'new'
            },
            {
                id: 'prod-3',
                name: 'Ultra Slim Laptop',
                category: 'Electronics',
                price: 1299.99,
                image: '../assets/images/product_laptop_1768510763985.png',
                rating: 4.7
            },
            {
                id: 'prod-4',
                name: 'Professional Camera',
                category: 'Electronics',
                price: 1899.99,
                image: '../assets/images/product_camera_1768510785099.png',
                rating: 4.9
            },
            {
                id: 'prod-5',
                name: 'Athletic Sneakers',
                category: 'Fashion',
                price: 129.99,
                originalPrice: 179.99,
                image: '../assets/images/product_sneakers_1768510804610.png',
                rating: 4.6,
                badge: 'sale'
            },
            {
                id: 'prod-6',
                name: 'Travel Backpack',
                category: 'Fashion',
                price: 89.99,
                image: '../assets/images/product_backpack_1768510823779.png',
                rating: 4.4
            }
        ];

        let currentResults = [];

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!query) {
                document.getElementById('searchResults').style.display = 'block';
                document.getElementById('resultsContainer').style.display = 'none';
                return;
            }

            currentResults = allProducts.filter(product =>
                product.name.toLowerCase().includes(query) ||
                product.category.toLowerCase().includes(query)
            );

            displayResults();
        }

        function displayResults() {
            const resultsContainer = document.getElementById('productResults');
            const resultsCount = document.getElementById('resultsCount');

            if (currentResults.length === 0) {
                document.getElementById('searchResults').innerHTML = `
                    <div style="text-align: center; padding: 4rem 0;">
                        <i class="bi bi-emoji-frown" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                        <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">No Results Found</h3>
                        <p style="color: var(--text-muted);">Try different keywords</p>
                    </div>
                `;
                document.getElementById('searchResults').style.display = 'block';
                document.getElementById('resultsContainer').style.display = 'none';
                return;
            }

            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';

            resultsCount.textContent = `${currentResults.length} ${currentResults.length === 1 ? 'Result' : 'Results'} Found`;

            resultsContainer.innerHTML = currentResults.map(product => `
                <div class="col-md-6 col-lg-4">
                    <div class="product-card">
                        <div class="product-card-image">
                            <img src="${product.image}" alt="${product.name}">
                            ${product.badge ? `<span class="product-badge ${product.badge}">${product.badge === 'sale' ? 'SALE' : 'NEW'}</span>` : ''}
                        </div>
                        <div class="product-card-body">
                            <p class="product-category">${product.category}</p>
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-rating">
                                <div class="product-stars">
                                    ${'<i class="bi bi-star-fill"></i>'.repeat(Math.floor(product.rating))}
                                    ${product.rating % 1 !== 0 ? '<i class="bi bi-star-half"></i>' : ''}
                                </div>
                                <span class="product-rating-count">(${Math.floor(Math.random() * 500 + 100)})</span>
                            </div>
                            <div class="product-price">
                                <span class="product-price-current">$${product.price.toFixed(2)}</span>
                                ${product.originalPrice ? `<span class="product-price-original">$${product.originalPrice.toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                        <div class="product-card-footer">
                            <button class="add-to-cart-btn" onclick="addToCart('${product.id}', '${product.name}', ${product.price}, '${product.image}')">
                                <i class="bi bi-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function sortResults(sortBy) {
            if (sortBy === 'price-low') {
                currentResults.sort((a, b) => a.price - b.price);
            } else if (sortBy === 'price-high') {
                currentResults.sort((a, b) => b.price - a.price);
            } else if (sortBy === 'name') {
                currentResults.sort((a, b) => a.name.localeCompare(b.name));
            }
            displayResults();
        }

        function addToCart(id, name, price, image) {
            if (window.ecommerceComponents && window.ecommerceComponents.addToCart) {
                window.ecommerceComponents.addToCart(id, name, price, image, 1);
            }
        }

        // Handle Enter key
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Check for query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        if (query) {
            document.getElementById('searchInput').value = query;
            performSearch();
        }
    </script>
</body>

</html>
